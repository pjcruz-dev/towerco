; TowerOS PHP OPcache tuning (dev + prod baseline).
; In dev the source is bind-mounted, so timestamps are validated (revalidate_freq).
; For production images set opcache.validate_timestamps=0 to skip filesystem stat calls.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=2
opcache.save_comments=1
opcache.jit=1255
opcache.jit_buffer_size=64M
