# TowerOS local/production stack only. Legacy formbuilder: legacy/atcformbuiilder/ (not a service here).
name: toweros

services:
  mysql:
    image: mysql:8.0
    container_name: toweros-mysql
    restart: unless-stopped
    ports:
      - "${TOWEROS_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-toweros}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-toweros}
      MYSQL_USER: ${MYSQL_USER:-toweros}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-toweros}
    volumes:
      - toweros-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    mem_limit: ${TOWEROS_MYSQL_MEM_LIMIT:-768m}
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-toweros}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  phpmyadmin:
    profiles: ["tools"]
    image: phpmyadmin:5-apache
    container_name: toweros-phpmyadmin
    restart: unless-stopped
    ports:
      - "${TOWEROS_PHPMYADMIN_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-toweros}
      UPLOAD_LIMIT: 64M
    mem_limit: ${TOWEROS_PHPMYADMIN_MEM_LIMIT:-256m}
    depends_on:
      mysql:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: toweros-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "${TOWEROS_REDIS_PORT:-6379}:6379"
    volumes:
      - toweros-redis-data:/data
    mem_limit: ${TOWEROS_REDIS_MEM_LIMIT:-256m}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    container_name: toweros-soketi
    restart: unless-stopped
    ports:
      - "${TOWEROS_SOKETI_PORT:-6001}:6001"
    environment:
      SOKETI_DEBUG: "${SOKETI_DEBUG:-0}"
      SOKETI_DEFAULT_APP_ID: toweros-local
      SOKETI_DEFAULT_APP_KEY: toweros-local
      SOKETI_DEFAULT_APP_SECRET: toweros-local-secret
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "true"
    mem_limit: ${TOWEROS_SOKETI_MEM_LIMIT:-256m}

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Bind-mounted script so entrypoint fixes apply without image rebuild.
    entrypoint: ["/bin/sh", "/var/www/html/docker/entrypoint.sh"]
    container_name: toweros-api
    restart: unless-stopped
    ports:
      - "${TOWEROS_API_PORT:-8000}:8000"
    # Module catalog and secrets live in bind-mounted backend/.env — do not duplicate via env_file
    # (stale env_file values override .env until the container is recreated).
    environment:
      TOWEROS_DOCKER: "1"
      TOWEROS_DOCKER_AUTO_MIGRATE: ${TOWEROS_DOCKER_AUTO_MIGRATE:-1}
      TOWEROS_API_WORKERS: ${TOWEROS_API_WORKERS:-1}
      DB_HOST: mysql
      DB_PORT: "3306"
      CENTRAL_DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-toweros}
      DB_USERNAME: ${MYSQL_USER:-toweros}
      DB_PASSWORD: ${MYSQL_PASSWORD:-toweros}
      # Redis for cache/session/permission store (service name wins over .env 127.0.0.1).
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CLIENT: predis
    volumes:
      - ./backend:/var/www/html
      - toweros-backend-vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      soketi:
        condition: service_started
      redis:
        condition: service_healthy
    mem_limit: ${TOWEROS_API_MEM_LIMIT:-512m}

  web:
    profiles: ["web"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: toweros-web
    restart: unless-stopped
    ports:
      - "${TOWEROS_WEB_PORT:-80}:80"
    env_file:
      - ./frontend/.env.docker
    environment:
      TOWEROS_DOCKER: "1"
      TOWEROS_WEB_MODE: ${TOWEROS_WEB_MODE:-dev}
      TOWEROS_WEB_FORCE_BUILD: ${TOWEROS_WEB_FORCE_BUILD:-0}
      # Windows bind mounts: polling avoids watcher crashes / surprise dev-server exits.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=1536}
    volumes:
      - ./frontend:/app
      - toweros-frontend-node:/app/node_modules
      - toweros-frontend-next:/app/.next
    depends_on:
      - api
    mem_limit: ${TOWEROS_WEB_MEM_LIMIT:-4g}

volumes:
  toweros-mysql-data:
  toweros-redis-data:
  toweros-backend-vendor:
  toweros-frontend-node:
  toweros-frontend-next:
